name: Check SVG/PDF references

# Run once per update: on PR (when branch is pushed) and on push to default branch (after merge).
# Do not trigger on both push and pull_request for the same branch to avoid duplicate runs.
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'utils/check_svg_pdf.sh'
      - '.github/workflows/check-svg-pdf.yml'
  push:
    branches:
      - 'versione-corrente'
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'utils/check_svg_pdf.sh'
      - '.github/workflows/check-svg-pdf.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check-svg-pdf:
    name: Validate SVG/PDF references in RST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: ShellCheck (lint bash scripts)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './utils'

      - name: Run SVG/PDF reference check
        run: |
          echo "Running utils/check_svg_pdf.sh from project root..."
          bash utils/check_svg_pdf.sh
