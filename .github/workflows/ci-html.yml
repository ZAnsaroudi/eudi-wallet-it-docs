# This is a basic workflow to help you get started with Actions

name: test-html

# Controls when the action will run.
on:
  push:
    branches: [ "*" ]
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'Dockerfile'
      - 'requirements-dev.txt'
      - 'tox.ini'
  pull_request:
    branches: [ "*" ]
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'Dockerfile'
      - 'requirements-dev.txt'
      - 'tox.ini'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder

concurrency:
  # Use branch name (or PR head branch) so push & PR for the same branch share the same group
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v3.4.0
        with:
          skip_after_successful_duplicate: 'true'
          same_content_newer: 'true'

  check_image_deps:
    runs-on: ubuntu-latest
    outputs:
      build-image: ${{ steps.filter.outputs.build-image }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build-image:
              - 'Dockerfile'
              - 'requirements-dev.txt'
              - 'tox.ini'

  # Check if :latest exists in GHCR so we can run tests without building when only docs/resources changed
  check_image_exists:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.pull.outputs.exists }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if builder image exists in GHCR
        id: pull
        run: |
          if docker pull ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:latest 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # Build only when image deps changed OR when no image exists in GHCR yet
  build_image:
    runs-on: ubuntu-latest
    needs: [check_image_deps, check_image_exists]
    if: |
      (needs.check_image_deps.outputs.build-image == 'true') ||
      (needs.check_image_exists.outputs.exists != 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Sphinx/LaTeX image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  get_image_tag:
    runs-on: ubuntu-latest
    needs: [pre_job, build_image]
    if: always() && (needs.build_image.result == 'success' || needs.build_image.result == 'skipped') && needs.pre_job.outputs.should_skip != 'true'
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - id: set_tag
        run: |
          if [ "${{ needs.build_image.result }}" = "success" ]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

  main_job:
    needs: [pre_job, get_image_tag]
    if: needs.pre_job.outputs.should_skip != 'true'

    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:${{ needs.get_image_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
      - name: Run Sphinx/labels tests via tox
        run: |-
          tox -e labels
          tox -e build
