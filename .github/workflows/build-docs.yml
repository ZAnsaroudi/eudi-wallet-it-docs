# Single workflow: one builder image, one job for both PDF and HTML build/deploy.
name: build-docs

on:
  push:
    branches: ['versione-corrente']
    tags: ['*']
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'Dockerfile'
      - 'requirements-dev.txt'
      - 'tox.ini'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'Dockerfile'
      - 'requirements-dev.txt'
      - 'tox.ini'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: "build-docs"
  cancel-in-progress: false

env:
  DEFAULT_BRANCH: versione-corrente
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder
  SETTINGS_FILE_NAME: "eid-wallet-it-docs"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      need_build: ${{ steps.release_only.outputs.need_build || steps.deps_check.outputs.need_build }}
    steps:
      - name: Use existing image (release / tag push)
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag')
        id: release_only
        run: echo "need_build=false" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: github.event_name != 'release' && !(github.event_name == 'push' && github.ref_type == 'tag')

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'release' && !(github.event_name == 'push' && github.ref_type == 'tag')
        id: filter
        with:
          filters: |
            build-image:
              - 'Dockerfile'
              - 'requirements-dev.txt'
              - 'tox.ini'

      - name: Check if image exists
        if: github.event_name != 'release' && !(github.event_name == 'push' && github.ref_type == 'tag')
        id: exists
        run: |
          docker login ghcr.io -u ${{ github.repository_owner }} -p "${{ secrets.GITHUB_TOKEN }}" 2>/dev/null || true
          if docker pull ${{ env.IMAGE_NAME }}:latest 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set need_build (deps changed or image missing)
        if: github.event_name != 'release' && !(github.event_name == 'push' && github.ref_type == 'tag')
        id: deps_check
        run: |
          if [[ "${{ steps.filter.outputs.build-image }}" == "true" ]] || [[ "${{ steps.exists.outputs.exists }}" != "true" ]]; then
            echo "need_build=true" >> $GITHUB_OUTPUT
          else
            echo "need_build=false" >> $GITHUB_OUTPUT
          fi

  image:
    runs-on: ubuntu-latest
    needs: [prepare]
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        if: needs.prepare.outputs.need_build == 'true'

      - name: Log in to GHCR
        if: needs.prepare.outputs.need_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: needs.prepare.outputs.need_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ needs.prepare.outputs.need_build }}" = "true" ]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

  # Single job: pull image once, build PDF + HTML, then deploy both as needed.
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [image]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    container:
      image: ${{ env.IMAGE_NAME }}:${{ needs.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set deployment path
        id: deployment
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "path=prs/pr${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "path=releases/${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "path=releases/${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "path=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Set document title
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="PR #${{ github.event.pull_request.number }}"
          else
            TAG=""
          fi
          if [[ -n "$TAG" ]]; then
            sed -i 's/\(settings_project_name = ".*\)"/\1 - '"${TAG}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - '"${TAG}"'"/' docs/en/conf.py
          else
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Versione Corrente"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Editor'"'"'s Copy"/' docs/en/conf.py
          fi
          sed -i 's/settings_file_name = ".*"/settings_file_name = "'"$SETTINGS_FILE_NAME"'"/' docs/en/conf.py

      # --- PDF build ---
      - name: Build LaTeX (EN)
        run: |
          sphinx-build -b latex docs/en/ build/latex/en
          cd build/latex/en
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" || true
          makeindex -s python.ist "$SETTINGS_FILE_NAME.idx" 2>/dev/null || true
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" || true
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" || true
          ls -la "$SETTINGS_FILE_NAME.pdf" || true

      - name: Build LaTeX (IT)
        run: |
          sphinx-build -b latex docs/it/ build/latex/it
          cd build/latex/it
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" || true
          makeindex -s python.ist "$SETTINGS_FILE_NAME.idx" 2>/dev/null || true
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" || true
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" || true
          ls -la "$SETTINGS_FILE_NAME.pdf" || true

      - name: Collect PDFs
        run: |
          mkdir -p pdf_output
          TS=$(date +%Y%m%d-%H%M%S)
          cp build/latex/it/$SETTINGS_FILE_NAME.pdf pdf_output/$SETTINGS_FILE_NAME-it-${TS}.pdf
          cp build/latex/en/$SETTINGS_FILE_NAME.pdf pdf_output/$SETTINGS_FILE_NAME-en-${TS}.pdf

      - name: Upload PDF to release
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: pdf_output/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf
          path: pdf_output/*.pdf

      # --- HTML build ---
      - name: Create HTML build directories
        run: |
          mkdir -p "html/${{ steps.deployment.outputs.path }}/it"
          mkdir -p "html/${{ steps.deployment.outputs.path }}/en"

      - name: Labels and xref check
        run: |
          sphinx-build -b dummy -W docs/it _build/labels/it
          sphinx-build -b dummy -W docs/en _build/labels/en

      - name: Build HTML
        run: |
          sphinx-build -b html docs/it/ html/${{ steps.deployment.outputs.path }}/it
          sphinx-build -b html docs/en/ html/${{ steps.deployment.outputs.path }}/en

      - name: Copy deploy assets
        run: |
          mkdir -p html/scripts html/templates html/static html/official_resources
          cp -r .github/scripts/* html/scripts/
          cp -r .github/templates/* html/templates/
          cp -r .github/static/* html/static/
          cp -r official_resources/* html/official_resources/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-temp

      - name: Update gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rsync -av html/ gh-pages-temp/
          cd gh-pages-temp
          python ./scripts/cleanup_old_prs.py
          python ./scripts/generate_index.py
          git config --local user.name 'GitHub Actions'
          git config --local user.email 'actions@github.com'
          git add .
          git commit -m "Update documentation and regenerate index" || true
          git push
